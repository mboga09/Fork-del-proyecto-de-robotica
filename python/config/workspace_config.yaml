robot:
  joint_steps: 5
  linear_steps: 2

  # El PathPlanner usa esta altura como offset relativo.
  # Plate config:
  #   deposit_height = 0.022 m
  #   approach_height = 0.060 m
  # Entonces:
  #   approach_height_m = 0.060 - 0.022 = 0.038 m
  approach_height_m: 0.038

# Nuevo home extremo izquierdo:
#   actuator HOME = servo2 0 deg, servo3 180 deg
#   mapper inverse: theta2 = servo2 - 30, theta3 = 235 - servo3
#   q_home = [d1=0, theta2=-30 deg, theta3=55 deg]
q_home:
  d1: 0.000
  theta2_deg: -30.000
  theta3_deg: 55.000

# Home rotacional a altura segura.
# El algoritmo de transferencia usa esta configuracion como punto intermedio:
#   HOME -> TUBO -> HOME -> WELL -> HOME
# TCP a z aprox. 0.120 m:
#   z_tcp = base_z + d1 - 0.024
#   0.120 = 0.0025 + d1 - 0.024
#   d1 = 0.1415
q_safe:
  d1: 0.1415
  theta2_deg: -30.000
  theta3_deg: 55.000

source:
  # TUBO teach point from direct MOVE_ACT:
  #   servo2=46 deg, servo3=170 deg
  #   theta2=16 deg, theta3=65 deg
  # FK result with L2=L3=0.150 m:
  #   x=0.167654 m, y=0.189499 m
  pose:
    x: 0.167654
    y: 0.189499
    z: 0.200

  # Cada toma baja 1 mm adicional porque el nivel del liquido se reduce.
  depth_step_m: 0.001

  # Approach q for TUBO at z + approach_height_m.
  approach_q:
    d1: 0.2595
    theta2_deg: 16.000
    theta3_deg: 65.000

wells:
  # Teach-point calibration from direct MOVE_ACT commands after redefining HOME.
  # Current actuator mapper inverse:
  #   theta2_deg = servo2_deg - 30
  #   theta3_deg = 235 - servo3_deg
  # The x/y poses below are FK results using L2=L3=0.150 m.
  # The z pose remains the deposit height, and approach_q uses z + 0.038 m.
  A1:
    # servo2=49 deg, servo3=45 deg -> theta2=19 deg, theta3=190 deg
    pose:
      x: 0.010635
      y: -0.023886
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 19.000
      theta3_deg: 190.000

  A2:
    # servo2=90 deg, servo3=55 deg -> theta2=60 deg, theta3=180 deg
    pose:
      x: 0.000000
      y: 0.000000
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 60.000
      theta3_deg: 180.000

  A3:
    # servo2=140 deg, servo3=73 deg -> theta2=110 deg, theta3=162 deg
    pose:
      x: -0.046068
      y: -0.008955
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 110.000
      theta3_deg: 162.000

  B1:
    # servo2=38 deg, servo3=27 deg -> theta2=8 deg, theta3=208 deg
    pose:
      x: 0.027188
      y: -0.067292
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 8.000
      theta3_deg: 208.000

  B2:
    # servo2=78 deg, servo3=40 deg -> theta2=48 deg, theta3=195 deg
    pose:
      x: 0.032271
      y: -0.022179
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 48.000
      theta3_deg: 195.000

  B3:
    # servo2=131 deg, servo3=56 deg -> theta2=101 deg, theta3=179 deg
    pose:
      x: -0.002574
      y: -0.000477
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 101.000
      theta3_deg: 179.000
