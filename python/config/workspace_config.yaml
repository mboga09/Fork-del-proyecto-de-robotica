robot:
  joint_steps: 5
  linear_steps: 2

  # El PathPlanner usa esta altura como offset relativo.
  # Plate config:
  #   deposit_height = 0.022 m
  #   approach_height = 0.060 m
  # Entonces:
  #   approach_height_m = 0.060 - 0.022 = 0.038 m
  approach_height_m: 0.038

q_home:
  d1: 0.000
  theta2_deg: 0.0
  theta3_deg: 0.0

# TCP a z ≈ 0.060 m:
# z_tcp = base_z + d1 - 0.024
# 0.060 = 0.0025 + d1 - 0.024
# d1 = 0.0815
q_safe:
  d1: 0.0815
  theta2_deg: 0.0
  theta3_deg: 0.0

