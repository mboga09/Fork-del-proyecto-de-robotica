robot:
  joint_steps: 5
  linear_steps: 2

  # El PathPlanner usa esta altura como offset relativo.
  # Plate config:
  #   deposit_height = 0.022 m
  #   approach_height = 0.060 m
  # Entonces:
  #   approach_height_m = 0.060 - 0.022 = 0.038 m
  approach_height_m: 0.038

q_home:
  d1: 0.000
  theta2_deg: 0.0
  theta3_deg: 0.0

# TCP a z aprox. 0.120 m:
# z_tcp = base_z + d1 - 0.024
# 0.120 = 0.0025 + d1 - 0.024
# d1 = 0.1415
q_safe:
  d1: 0.1415
  theta2_deg: 0.0
  theta3_deg: 0.0

source:
  # Source mirrored across X axis, moved -0.030 m in X, +0.050 m in Y,
  # then +0.100 m in X.
  # Reachability check with L2=L3=0.150 m and q3 offset removed:
  #   r = sqrt(0.244^2 + (-0.157)^2) = 0.290 m
  #   elbow-down approx: theta2=-18.034 deg, theta3=-29.451 deg
  #   elbow-up approx:   theta2=-47.484 deg, theta3=29.451 deg
  pose:
    x: 0.244
    y: -0.157
    z: 0.200

  # Cada toma baja 1 mm adicional porque el nivel del liquido se reduce.
  depth_step_m: 0.001

  # Valid elbow-down IK seed for the source approach pose.
  approach_q:
    d1: 0.2595
    theta2_deg: -18.034
    theta3_deg: -29.451

wells:
  # Teach-point calibration from direct MOVE_ACT commands.
  # Current actuator mapper:
  #   theta2_deg = servo2_deg - 90
  #   theta3_deg = 135 - servo3_deg
  # The x/y poses below are FK results using L2=L3=0.150 m.
  # The z pose remains the deposit height, and approach_q uses z + 0.038 m.
  A1:
    pose:
      x: 0.212132
      y: 0.000000
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -45.000
      theta3_deg: 90.000

  A2:
    pose:
      x: 0.181187
      y: 0.146722
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 0.000
      theta3_deg: 78.000

  A3:
    pose:
      x: 0.066011
      y: 0.255247
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 47.000
      theta3_deg: 57.000

  B1:
    pose:
      x: 0.172047
      y: -0.003003
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -56.000
      theta3_deg: 110.000

  B2:
    pose:
      x: 0.162401
      y: 0.117992
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -12.000
      theta3_deg: 96.000

  B3:
    pose:
      x: 0.059480
      y: 0.221983
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 35.000
      theta3_deg: 80.000
