robot:
  joint_steps: 5
  linear_steps: 2

  # El PathPlanner usa esta altura como offset relativo.
  # Plate config:
  #   deposit_height = 0.022 m
  #   approach_height = 0.060 m
  # Entonces:
  #   approach_height_m = 0.060 - 0.022 = 0.038 m
  approach_height_m: 0.038

q_home:
  d1: 0.000
  theta2_deg: 0.0
  theta3_deg: 0.0

# TCP a z aprox. 0.120 m:
# z_tcp = base_z + d1 - 0.024
# 0.120 = 0.0025 + d1 - 0.024
# d1 = 0.1415
q_safe:
  d1: 0.1415
  theta2_deg: 0.0
  theta3_deg: 0.0

source:
  # Source mirrored across X axis, then moved +0.100 m in X.
  # Reachability check with L2=L3=0.150 m and q3 offset removed:
  #   r = sqrt(0.274^2 + (-0.207)^2) = 0.343 m
  #   max radial reach = 0.300 m
  # This point is outside the geometric workspace, so no IK seed is updated.
  pose:
    x: 0.274
    y: -0.207
    z: 0.200

  # Cada toma baja 1 mm adicional porque el nivel del liquido se reduce.
  depth_step_m: 0.001

  # Seed kept inside current limits as a placeholder. It is not a valid IK
  # solution for the source above because the source is outside max reach.
  approach_q:
    d1: 0.2595
    theta2_deg: 24.291
    theta3_deg: 6.318

wells:
  # Rack 2x3 reubicado dentro del workspace actual.
  # Pose numerica: A2 aprox. (0.2250, 0.1038), rotacion aprox. 129.7 deg.
  A1:
    pose:
      x: 0.249912
      y: 0.073793
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -13.253
      theta3_deg: 14.408

  A2:
    pose:
      x: 0.225000
      y: 0.103800
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -9.548
      theta3_deg: 23.627

  A3:
    pose:
      x: 0.200088
      y: 0.133807
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -2.872
      theta3_deg: 28.289

  B1:
    pose:
      x: 0.279919
      y: 0.098705
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 11.063
      theta3_deg: -28.278

  B2:
    pose:
      x: 0.255007
      y: 0.128712
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 8.988
      theta3_deg: -9.412

  B3:
    pose:
      x: 0.230095
      y: 0.158719
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: 13.308
      theta3_deg: -2.420
