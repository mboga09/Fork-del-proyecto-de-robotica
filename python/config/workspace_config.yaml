robot:
  joint_steps: 5
  linear_steps: 2

  # El PathPlanner usa esta altura como offset relativo.
  # Plate config:
  #   deposit_height = 0.022 m
  #   approach_height = 0.060 m
  # Entonces:
  #   approach_height_m = 0.060 - 0.022 = 0.038 m
  approach_height_m: 0.038

q_home:
  d1: 0.000
  theta2_deg: 0.0
  theta3_deg: 0.0

# TCP a z aprox. 0.120 m:
# z_tcp = base_z + d1 - 0.024
# 0.120 = 0.0025 + d1 - 0.024
# d1 = 0.1415
q_safe:
  d1: 0.1415
  theta2_deg: 0.0
  theta3_deg: 0.0

source:
  # Source mirrored across X axis, moved -0.030 m in X, +0.050 m in Y,
  # then +0.100 m in X.
  # Reachability check with L2=L3=0.150 m and q3 offset removed:
  #   r = sqrt(0.244^2 + (-0.157)^2) = 0.290 m
  #   elbow-down approx: theta2=-18.034 deg, theta3=-29.451 deg
  #   elbow-up approx:   theta2=-47.484 deg, theta3=29.451 deg
  # Elbow-down is inside the current joint limits, so approach_q is updated.
  pose:
    x: 0.244
    y: -0.157
    z: 0.200

  # Cada toma baja 1 mm adicional porque el nivel del liquido se reduce.
  depth_step_m: 0.001

  # Valid elbow-down IK seed for the source approach pose.
  approach_q:
    d1: 0.2595
    theta2_deg: -18.034
    theta3_deg: -29.451

wells:
  # Rack 2x3 corrected with B1 as reference:
  #   B1 = (0.168 m, 0.099203 m)
  #   Row A is +0.039 m in X from row B.
  #   Columns 2 and 3 are -0.039 m and -0.078 m in Y from column 1.
  # Approach q values are analytic IK seeds using the positive-q3 branch.
  # Note: with current q3 limit +/-45 deg, these rack points remain outside limits.
  A1:
    pose:
      x: 0.207000
      y: 0.099203
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -14.474
      theta3_deg: 80.160

  A2:
    pose:
      x: 0.207000
      y: 0.060203
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -27.846
      theta3_deg: 88.124

  A3:
    pose:
      x: 0.207000
      y: 0.021203
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -40.235
      theta3_deg: 92.167

  B1:
    pose:
      x: 0.168000
      y: 0.099203
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -18.871
      theta3_deg: 98.865

  B2:
    pose:
      x: 0.168000
      y: 0.060203
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -33.781
      theta3_deg: 106.993

  B3:
    pose:
      x: 0.168000
      y: 0.021203
      z: 0.022
    approach_q:
      d1: 0.0815
      theta2_deg: -48.443
      theta3_deg: 111.273
