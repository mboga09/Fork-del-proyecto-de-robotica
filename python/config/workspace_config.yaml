robot:
  joint_steps: 5
  linear_steps: 2
  approach_height_m: 0.038

# Calibracion Z por tiempo con z_speed_m_per_s = 0.0012:
#   HOME desde limit switch: +30.0 s -> d1 = 0.0360 m
#   INTRODUCIR_JERINGA desde HOME: -20.0 s -> d1 = 0.0120 m
#   RACK desde HOME: -30.0 s -> d1 = 0.0000 m
# El limit switch calibra d1=0 y tambien marca el punto de release/dispense.
q_z_calibration:
  d1: 0.0000
  theta2_deg: -90.000
  theta3_deg: 55.000

q_home:
  d1: 0.0360
  theta2_deg: -90.000
  theta3_deg: 55.000

q_safe:
  d1: 0.0360
  theta2_deg: -90.000
  theta3_deg: 55.000

