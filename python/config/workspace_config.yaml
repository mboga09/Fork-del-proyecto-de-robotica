robot:
  joint_steps: 5
  linear_steps: 2
  approach_height_m: 0.038

# Resultado virtual del homing inicial de Z: el eje baja hasta activar
# el limit switch. Este punto calibra d1=0, pero NO es el home de ruta.
q_z_calibration:
  d1: 0.000
  theta2_deg: -90.000
  theta3_deg: 55.000

# Home de ruta: punto alto/extremo usado entre trayectorias para
# mantener calibracion y evitar colisiones.
q_home:
  d1: 0.1415
  theta2_deg: -90.000
  theta3_deg: 55.000

q_safe:
  d1: 0.1415
  theta2_deg: -90.000
  theta3_deg: 55.000

